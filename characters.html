              <div class="characters-library-switcher" role="tablist" aria-label="문자표 탭">
                <button class="level-button is-active" type="button" data-characters-library-tab="hiragana" id="characters-library-tab-hiragana" role="tab" aria-selected="true" aria-controls="characters-library-panel-hiragana">히라가나</button>
                <button class="level-button" type="button" data-characters-library-tab="katakana" id="characters-library-tab-katakana" role="tab" aria-selected="false" aria-controls="characters-library-panel-katakana" tabindex="-1">카타카나</button>
              </div>
            </div>

            <article class="kana-table-card characters-library-panel" id="characters-library-panel-hiragana" data-characters-library-panel="hiragana" role="tabpanel" aria-labelledby="characters-library-tab-hiragana">
              <div class="kana-table-body" id="hiragana-table"></div>
            </article>

            <article class="kana-table-card characters-library-panel" id="characters-library-panel-katakana" data-characters-library-panel="katakana" role="tabpanel" aria-labelledby="characters-library-tab-katakana" hidden aria-hidden="true">
              <div class="kana-table-body" id="katakana-table"></div>

            <div class="match-shell kana-quiz-shell">
              <aside class="match-sidebar">
                <div class="study-options-shell match-options-shell" id="kana-setup-shell">
                  <button class="study-options-toggle" id="kana-setup-toggle" type="button" aria-expanded="false" aria-controls="kana-setup-panel" aria-label="퀴즈 설정을 골라볼까요?" title="퀴즈 설정을 골라볼까요?">
                    <div class="study-options-toggle-copy"><strong>퀴즈 설정을 골라볼까요?</strong><p class="study-options-toggle-summary" id="kana-setup-summary">히라가나 · 10문제 · 5초</p></div>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </button>
                  <div class="study-options-panel study-options-panel-compact" id="kana-setup-panel" hidden aria-hidden="true">
                    <div class="study-options-group"><span>문자 선택</span><div class="study-options-button-grid study-options-button-grid-triple"><button class="level-button is-active" type="button" data-kana-mode="hiragana">히라가나</button><button class="level-button" type="button" data-kana-mode="katakana">카타카나</button><button class="level-button" type="button" data-kana-mode="random">랜덤</button></div></div>
                    <div class="study-options-group"><span>문제 수</span><div class="study-spinner" data-spinner-id="kana-quiz-count" role="group" aria-label="문자 퀴즈 문제 수 고르기">
                        <button class="study-spinner-button" type="button" data-spinner-direction="-1" aria-label="문자 퀴즈 문제 수 감소"><span class="material-symbols-rounded" aria-hidden="true">remove</span></button>
                        <output class="study-spinner-value" data-spinner-value aria-live="polite">10문제</output>
                        <button class="study-spinner-button" type="button" data-spinner-direction="1" aria-label="문자 퀴즈 문제 수 증가"><span class="material-symbols-rounded" aria-hidden="true">add</span></button>
                      </div></div>
                    <div class="kana-setup-group"><span>제한 시간</span><div class="study-spinner" data-spinner-id="kana-quiz-time" role="group" aria-label="문자 퀴즈 시간 고르기">
                        <button class="study-spinner-button" type="button" data-spinner-direction="-1" aria-label="문자 퀴즈 시간 감소"><span class="material-symbols-rounded" aria-hidden="true">remove</span></button>
                        <output class="study-spinner-value" data-spinner-value aria-live="polite">5초</output>
                        <button class="study-spinner-button" type="button" data-spinner-direction="1" aria-label="문자 퀴즈 시간 증가"><span class="material-symbols-rounded" aria-hidden="true">add</span></button>

                  </div>

                </div>
              </aside>
              <div class="match-board kana-quiz-board">
                <p class="vocab-list-empty" id="kana-quiz-empty">준비됐다면 시작해볼까요?</p>
                <div class="kana-quiz-sheet" id="kana-quiz-practice-view" aria-hidden="true" hidden>
                  <article class="basic-practice-card kana-practice-card" id="kana-quiz-card" hidden>
                    <div class="basic-practice-meta"><span id="kana-quiz-sheet-source">-</span></div>
                    <div class="quiz-hud has-timer">
                      <div class="quiz-hud-top">
                        <div class="quiz-hud-stats">
                          <div class="quiz-hud-progress">
                            <div class="quiz-hud-item quiz-hud-progress-item is-progress" data-hud-kind="progress">
                              <div class="quiz-hud-item-copy"><span>진행</span><strong id="kana-quiz-sheet-progress">1 / 1</strong></div>
                            </div>
                          </div>
                          <div class="quiz-hud-item is-correct" data-hud-kind="correct"><div class="quiz-hud-item-copy"><span>정답</span><strong id="kana-quiz-correct">0</strong></div></div>
                          <span class="quiz-hud-summary-divider" aria-hidden="true"></span>
                          <div class="quiz-hud-item is-wrong" data-hud-kind="wrong"><div class="quiz-hud-item-copy"><span>오답</span><strong id="kana-quiz-wrong">0</strong></div></div>
                        </div>
                      </div>
                      <div class="quiz-hud-bottom">
                        <div class="quiz-hud-track-slot"><div class="quiz-hud-track" aria-hidden="true"><span class="quiz-hud-track-fill"></span></div></div>
                        <div class="quiz-hud-timer">
                          <div class="quiz-hud-item is-timer" data-hud-kind="timer">
                            <div class="quiz-hud-item-copy"><span>남은 시간</span><strong id="kana-quiz-timer">00:00</strong></div>
                          </div>
                        </div>
                        <button class="quiz-hud-pause" id="kana-quiz-pause" type="button" aria-label="일시정지" title="일시정지">
                          <span class="quiz-hud-pause-glyph" aria-hidden="true"></span>
                        </button>
                      </div>
                    </div>
                    <div class="basic-practice-prompt-box" id="kana-quiz-sheet-copy" hidden><span class="eyebrow">QUESTION</span><p id="kana-quiz-sheet-prompt">문제를 불러오고 있어요.</p></div>

                    <p class="basic-practice-note" id="kana-quiz-sheet-note" hidden></p>
                    <div class="basic-practice-options" id="kana-quiz-options"></div>
                    <p class="basic-practice-feedback kana-quiz-feedback" id="kana-quiz-feedback"></p>

                    <div class="quiz-actions kana-quiz-actions"><button class="primary-btn" id="kana-quiz-next" type="button">다음 문제 볼까요?</button></div>
                  </article>
                </div>
                <div class="match-result-view kana-result-view" id="kana-quiz-result-view" hidden>

                    <button class="match-result-stat match-result-stat-button is-active" id="kana-quiz-result-filter-all" type="button" data-result-filter="all" aria-pressed="true"><span>전체</span><strong id="kana-quiz-result-total">0</strong></button>
                    <button class="match-result-stat match-result-stat-button" id="kana-quiz-result-filter-correct" type="button" data-result-filter="correct" aria-pressed="false"><span>정답</span><strong id="kana-quiz-result-correct-count">0</strong></button>
                    <button class="match-result-stat match-result-stat-button" id="kana-quiz-result-filter-wrong" type="button" data-result-filter="wrong" aria-pressed="false"><span>오답</span><strong id="kana-quiz-result-wrong-count">0</strong></button>
                  </div>
                  <p class="match-result-empty" id="kana-quiz-result-empty" hidden>아직 결과가 없어요. 문제를 풀고 다시 확인해봐요.</p>
                  <div class="match-result-list" id="kana-quiz-result-list"></div>
                  <div class="quiz-actions"><button class="primary-btn button-with-icon" id="kana-quiz-restart" type="button" aria-label="다시 해볼까요?" title="다시 해볼까요?"><span class="material-symbols-rounded" aria-hidden="true">autorenew</span><span>다시 해볼까요?</span></button></div>
                </div>
              </div>

              <article class="match-sidebar writing-practice-copy">
                <div class="study-options-shell match-options-shell writing-setup-shell" id="writing-setup-shell">
                  <button class="study-options-toggle" id="writing-setup-toggle" type="button" aria-expanded="false" aria-controls="writing-setup-panel" aria-label="따라쓰기 설정을 골라볼까요?" title="따라쓰기 설정을 골라볼까요?">
                    <div class="study-options-toggle-copy"><strong>따라쓰기 설정을 골라볼까요?</strong><p class="study-options-toggle-summary" id="writing-setup-summary">히라가나 · 순서대로</p></div>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </button>
                  <div class="kana-setup-panel writing-setup-panel" id="writing-setup-panel" hidden aria-hidden="true">
                    <div class="kana-setup-group"><span>문자 선택</span><div class="writing-practice-switcher" id="writing-practice-switcher" aria-label="따라쓰기 문자 고르기"><button class="level-button is-active" type="button" data-writing-mode="hiragana">히라가나</button><button class="level-button" type="button" data-writing-mode="katakana">카타카나</button><button class="level-button" type="button" data-writing-mode="random">랜덤</button></div></div>
                    <div class="kana-setup-group"><span>순서</span><div class="writing-practice-order-switcher" aria-label="따라쓰기 순서 선택"><button class="level-button is-active" type="button" data-writing-order="sequence">순서대로</button><button class="level-button" type="button" data-writing-order="random">랜덤</button></div></div>
                  </div>
                </div>
                
                <p class="writing-practice-feedback" id="writing-practice-feedback" hidden></p>
              </article>
              <article class="writing-practice-card">
                <div class="writing-practice-meta">
                  <span id="writing-practice-source">히라가나 · 기본음</span>
                  <span id="writing-practice-progress">1 / 1</span>
                  <span id="writing-practice-strokes">0획</span>
                </div>
                <div class="writing-practice-scoreboard">
                  <div class="writing-practice-current-card">
                    <div class="writing-practice-current-row">
                      <strong id="writing-practice-char">-</strong>
                      <span class="writing-practice-current-separator">읽기</span>
                      <strong id="writing-practice-reading">-</strong>
                    </div>
                  </div>
                  <div><span>점수 확인</span><strong id="writing-practice-score">-</strong></div>
                </div>
                <div class="writing-practice-actions-row writing-practice-actions-row-trio">
                    <button class="secondary-btn" id="writing-practice-replay" type="button" aria-label="획순 보기" title="획순 보기">획순 보기</button>
                    <button class="secondary-btn writing-practice-guide-toggle" id="writing-guide-toggle" type="button" aria-label="가이드">
                      <span class="writing-practice-guide-label">가이드</span>
                      <span class="material-symbols-rounded writing-practice-guide-icon" aria-hidden="true">visibility</span>
                    </button>
                    <button class="primary-btn" id="writing-practice-score-btn" type="button" aria-label="점수 확인" title="점수 확인">점수 확인</button>
                </div>
                <div class="writing-practice-stage-shell">
                  <div class="writing-practice-stage" id="writing-practice-stage">
                    <div class="writing-svg-layer" id="writing-svg-layer" aria-hidden="true"></div>
                    <canvas id="writing-overlay-canvas" aria-label="문자 따라쓰기 캔버스"></canvas>
                    <div class="writing-practice-stage-empty" id="writing-practice-stage-empty" hidden>따라쓰기를 준비 중이에요. 잠시만 기다려주세요.</div>
                  </div>
                </div>
                <div class="writing-practice-actions">
                  <div class="writing-practice-actions-row writing-practice-actions-row-trio">
                    <button class="secondary-btn" id="writing-practice-prev" type="button" aria-label="이전 글자" title="이전 글자">이전 글자</button>
                    <button class="secondary-btn" id="writing-practice-clear" type="button">지우기</button>
                    <button class="secondary-btn" id="writing-practice-next" type="button">다음 글자</button>
                  </div>
                </div>
              </article>
            </div>
          </section>
        </div>
      </section>
