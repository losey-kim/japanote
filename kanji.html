<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="기초 한자를 익히고 퀴즈로 가볍게 복습해보세요.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Japanote">
  <meta property="og:title" content="Japanote">
  <meta property="og:description" content="기초 한자를 익히고 퀴즈로 가볍게 복습해보세요.">
  <meta property="og:url" content="https://losey-kim.github.io/Japanote/kanji.html">
  <meta property="og:image" content="https://losey-kim.github.io/Japanote/assets/images/social-preview.png">
  <meta property="og:image:alt" content="Japanote 로고">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Japanote">
  <meta name="twitter:description" content="기초 한자를 익히고 퀴즈로 가볍게 복습해보세요.">
  <meta name="twitter:image" content="https://losey-kim.github.io/Japanote/assets/images/social-preview.png">
  <title>Japanote - 한자 익혀볼까요</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span>
        <div>
          <p class="brand-name">Japanote</p>
          <p class="brand-sub">오늘도 가볍게 일본어를 익혀봐요</p>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="characters.html">문자</a>
        <a href="kanji.html" aria-current="page">한자</a>
        <a href="vocab.html">단어</a>
        <a href="grammar.html">문법</a>
        <a href="reading.html">독해</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 바꿔볼까요?" title="테마 바꿔볼까요?"></button>
    </header>
    <main>
      <section class="content-section">
        <div class="vocab-tab-list kanji-tab-list" role="tablist" aria-label="한자 학습 탭">
          <button class="level-button vocab-tab-button is-active" type="button" data-kanji-tab="list" id="kanji-tab-list" role="tab" aria-selected="true" aria-controls="kanji-tab-panel-list">목록</button>
          <button class="level-button vocab-tab-button" type="button" data-kanji-tab="practice" id="kanji-tab-practice" role="tab" aria-selected="false" aria-controls="kanji-tab-panel-practice" tabindex="-1">풀어보기</button>
          <button class="level-button vocab-tab-button" type="button" data-kanji-tab="match" id="kanji-tab-match" role="tab" aria-selected="false" aria-controls="kanji-tab-panel-match" tabindex="-1">짝맞추기</button>
        </div>
        <div class="vocab-tab-panels kanji-tab-panels">
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-list" data-kanji-tab-panel="list" role="tabpanel" aria-labelledby="kanji-tab-list">
            <div class="flashcard-panel">
              <div class="vocab-select-toolbar kanji-filter-toolbar" aria-label="한자 필터">
                <label class="vocab-select-field" for="kanji-collection-select">
                  <span>모아보기</span>
                  <div class="vocab-select-wrap">
                    <select class="vocab-select" id="kanji-collection-select" aria-label="한자 모아보기 고르기">
                      <option value="all">전체</option>
                      <option value="review">다시 볼래요</option>
                      <option value="mastered">익혔어요</option>
                      <option value="unmarked">아직 안 정했어요</option>
                    </select>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </div>
                </label>
                <label class="vocab-select-field" for="kanji-grade-select">
                  <span>학년</span>
                  <div class="vocab-select-wrap">
                    <select class="vocab-select" id="kanji-grade-select" aria-label="한자 학년 고르기">
                      <option value="all">전체</option>
                      <option value="1">1학년</option>
                      <option value="2">2학년</option>
                      <option value="3">3학년</option>
                      <option value="4">4학년</option>
                      <option value="5">5학년</option>
                      <option value="6">6학년</option>
                    </select>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </div>
                </label>
              </div>
              <div class="study-panel-head">
                <p class="vocab-summary" id="kanji-summary">0개 한자를 준비하고 있어요</p>
                <div class="study-view-switch" role="tablist" aria-label="한자 보기 방식 고르기">
                  <button class="study-view-button is-active" type="button" data-kanji-view="card" aria-pressed="true" aria-label="카드로 보기" title="카드로 보기">
                    <span class="material-symbols-rounded" aria-hidden="true">style</span>
                  </button>
                  <button class="study-view-button" type="button" data-kanji-view="list" aria-pressed="false" aria-label="목록으로 보기" title="목록으로 보기">
                    <span class="material-symbols-rounded" aria-hidden="true">view_list</span>
                  </button>
                </div>
              </div>
              <div class="vocab-card-view kanji-card-view" id="kanji-card-view">
                <article class="flashcard kanji-flashcard" id="kanji-flashcard" aria-live="polite">
                  <button class="flashcard-toggle" id="kanji-flashcard-toggle" type="button" aria-controls="kanji-flashcard-meaning" aria-expanded="false">
                    <span class="flashcard-level" id="kanji-flashcard-level">한자</span>
                    <div class="flashcard-copy">
                      <strong class="flashcard-word kanji-flashcard-word" id="kanji-flashcard-word">漢字</strong>
                      <p class="flashcard-reading kanji-flashcard-reading" id="kanji-flashcard-reading" hidden></p>
                      <p class="flashcard-meaning kanji-flashcard-meaning" id="kanji-flashcard-meaning">かんじ</p>
                    </div>
                    <span class="flashcard-hint" id="kanji-flashcard-hint">눌러서 읽기를 확인해볼까요?</span>
                  </button>
                  <div class="flashcard-inline-nav" aria-label="한자 익히기">
                    <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="kanji-flashcard-prev" type="button" aria-label="이전 한자" title="이전 한자"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span></button>
                    <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="kanji-flashcard-next" type="button" aria-label="다음 한자" title="다음 한자"><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
                  </div>
                </article>
                <div class="flashcard-actions">
                  <button class="secondary-btn" id="kanji-flashcard-review" type="button">다시 볼래요</button>
                  <button class="primary-btn" id="kanji-flashcard-mastered" type="button">익혔어요!</button>
                </div>
              </div>
              <div class="vocab-list-view kanji-list-view" id="kanji-list-view" hidden>
                <div class="vocab-list kanji-list" id="kanji-list"></div>
                <div class="vocab-pagination">
                  <button class="secondary-btn button-with-icon" id="kanji-page-prev" type="button"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span><span>이전</span></button>
                  <span class="vocab-page-info" id="kanji-page-info">1 / 1</span>
                  <button class="secondary-btn button-with-icon" id="kanji-page-next" type="button"><span>다음</span><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
                </div>
              </div>
            </div>
          </section>
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-practice" data-kanji-tab-panel="practice" role="tabpanel" aria-labelledby="kanji-tab-practice" hidden aria-hidden="true">
            <div data-shared-quiz-layout="starter-kanji-practice"></div>
          </section>
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-match" data-kanji-tab-panel="match" role="tabpanel" aria-labelledby="kanji-tab-match" hidden aria-hidden="true">
            <div data-shared-quiz-layout="kanji-match-round"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-sync.js"></script><script src="assets/js/theme.js"></script><script src="assets/js/jlpt-vocab-data.js"></script><script src="assets/js/vocab-registry.js"></script><script src="assets/js/shared-quiz-layouts.js"></script><script src="assets/js/kanji-data.js"></script><script src="assets/js/app.js"></script><script src="assets/js/kanji-match-game.js"></script>
</body>
</html>
