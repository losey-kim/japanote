<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span>
        <div>
          <p class="brand-name">Japanote</p>
          <p class="brand-sub">오늘도 가볍게 일본어 해봐요</p>
        </div>

      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="characters.html">문자</a>
        <a href="kanji.html" aria-current="page">한자</a>

        <a href="grammar.html">문법</a>
        <a href="reading.html">독해</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 바꿔볼까요?" title="테마 바꿔볼까요?"></button>
    </header>
    <main>
      <section class="content-section">
        <div class="vocab-tab-list kanji-tab-list" role="tablist" aria-label="한자 학습 탭">
          <button class="level-button vocab-tab-button is-active" type="button" data-kanji-tab="list" id="kanji-tab-list" role="tab" aria-selected="true" aria-controls="kanji-tab-panel-list">목록</button>
          <button class="level-button vocab-tab-button" type="button" data-kanji-tab="practice" id="kanji-tab-practice" role="tab" aria-selected="false" aria-controls="kanji-tab-panel-practice" tabindex="-1">풀어보기</button>
          <button class="level-button vocab-tab-button" type="button" data-kanji-tab="match" id="kanji-tab-match" role="tab" aria-selected="false" aria-controls="kanji-tab-panel-match" tabindex="-1">짝맞추기</button>
        </div>
        <div class="vocab-tab-panels kanji-tab-panels">
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-list" data-kanji-tab-panel="list" role="tabpanel" aria-labelledby="kanji-tab-list">
            <div class="vocab-select-toolbar kanji-filter-toolbar" aria-label="한자 학년 필터">
              <label class="vocab-select-field" for="kanji-collection-select">
                <span>모아보기</span>
                <div class="vocab-select-wrap">
                  <select class="vocab-select" id="kanji-collection-select" aria-label="한자 모아보기 고르기">
                    <option value="all">전체</option>
                    <option value="review">다시 볼래요</option>
                    <option value="mastered">익혔어요</option>
                  </select>
                  <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                </div>
              </label>
              <label class="vocab-select-field" for="kanji-grade-select">
                <span>학년</span>
                <div class="vocab-select-wrap">
                  <select class="vocab-select" id="kanji-grade-select" aria-label="한자 학년 고르기">
                    <option value="all">전체</option>
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                    <option value="4">4학년</option>
                    <option value="5">5학년</option>
                    <option value="6">6학년</option>
                  </select>
                  <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                </div>
              </label>
            </div>
            <div class="vocab-list kanji-list" id="kanji-list"></div>
          </section>
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-practice" data-kanji-tab-panel="practice" role="tabpanel" aria-labelledby="kanji-tab-practice" hidden aria-hidden="true">
            <div data-shared-quiz-layout="starter-kanji-practice"></div>
          </section>
          <section class="vocab-tab-panel kanji-tab-panel" id="kanji-tab-panel-match" data-kanji-tab-panel="match" role="tabpanel" aria-labelledby="kanji-tab-match" hidden aria-hidden="true">
            <div data-shared-quiz-layout="kanji-match-round"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-sync.js"></script><script src="assets/js/theme.js"></script><script src="assets/js/jlpt-vocab-data.js"></script><script src="assets/js/vocab-registry.js"></script><script src="assets/js/shared-quiz-layouts.js"></script><script src="assets/js/kanji-data.js"></script><script src="assets/js/app.js"></script><script src="assets/js/kanji-match-game.js"></script>
