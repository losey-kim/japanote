  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span><div><p class="brand-name">Japanote</p><p class="brand-sub">일본어 공부를 가볍게 정리하는 노트</p></div></a>
      <nav class="nav-links"><a href="index.html">홈</a><a href="starter.html">처음 시작</a><a href="characters.html">문자</a><a href="vocab.html">단어</a><a href="grammar.html">문법</a><a href="reading.html">독해</a><a href="quiz.html">퀴즈</a><a href="match.html" aria-current="page">게임</a></nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="현재 테마" title="테마"></button>
    </header>
    <main>
      <section class="content-section">
        <div class="match-shell">
          <aside class="match-sidebar">
            <div class="match-sidebar-head"><span class="eyebrow">ROUND HUD</span><h3>현재 라운드</h3></div>
            <div class="match-stats-grid">
              <div class="match-stat-card"><span>진행</span><strong id="match-progress">0 / 8</strong><p>맞춘 카드 쌍 수</p></div>
              <div class="match-stat-card"><span>시도</span><strong id="match-attempts">0</strong><p>선택한 횟수</p></div>
              <div class="match-stat-card"><span>연속 성공</span><strong id="match-streak">0</strong><p>연속으로 맞춘 횟수</p></div>
              <div class="match-stat-card"><span>최고 기록</span><strong id="match-best">0</strong><p>이번 접속 기준 최고 연속 성공</p></div>
            </div>
            <div class="match-actions"><button class="primary-btn button-with-icon" id="match-new-round" type="button"><span class="material-symbols-rounded" aria-hidden="true">autorenew</span><span>새 라운드</span></button><button class="secondary-btn button-with-icon" id="match-reset-round" type="button"><span class="material-symbols-rounded" aria-hidden="true">replay</span><span>현재 라운드 다시</span></button></div>
          </aside>
          <div class="match-board">
            <div class="match-feedback" id="match-feedback">왼쪽 카드와 오른쪽 카드를 하나씩 선택하세요.</div>
            <div class="match-columns">
              <section class="match-column"><div class="match-column-head"><span>LEFT</span><h3>가나 카드</h3></div><div class="match-card-list" id="match-left-list"></div></section>
              <section class="match-column"><div class="match-column-head"><span>RIGHT</span><h3>뜻 카드</h3></div><div class="match-card-list" id="match-right-list"></div></section>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/theme.js"></script><script src="assets/js/jlpt-n5-data.js"></script><script src="assets/js/match-game.js"></script>
</body>
</html>
