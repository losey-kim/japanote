<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span><div><p class="brand-name">Japanote</p><p class="brand-sub">오늘도 가볍게 일본어, 같이 해봐요</p></div></a>
      <nav class="nav-links"><a href="index.html">홈</a><a href="starter.html">첫걸음</a><a href="characters.html">문자</a><a href="kanji.html">한자</a><a href="vocab.html">단어</a><a href="grammar.html">문법</a><a href="reading.html" aria-current="page">독해</a><a href="match.html">매칭</a></nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 바꿔보기" title="테마 바꿔보기"></button>
    </header>
    <main>
      <section id="practice-sets" class="content-section">
        <div class="section-heading"><span>READING PRACTICE</span><h2>짧은 글, 같이 읽어볼까요?</h2><p class="section-copy">짧은 글부터 편하게 읽어보세요.</p></div>
        <div class="study-options-shell" id="reading-options-shell">
          <button class="study-options-toggle" id="reading-options-toggle" type="button" aria-expanded="true" aria-controls="reading-options-panel">
            <div class="study-options-toggle-copy"><strong>독해 설정</strong><p class="study-options-toggle-summary" id="reading-options-summary">N5 · 45초</p></div>
            <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
          </button>
          <div class="study-options-panel study-options-panel-compact" id="reading-options-panel">
            <div class="study-options-group">
              <span>어느 레벨로 읽을까요?</span>
              <div class="reading-level-switcher" id="reading-level-switcher" role="tablist" aria-label="독해 레벨 고르기"></div>
            </div>
            <div class="study-options-group">
              <span>시간은 어떻게 할까요?</span>
              <div class="reading-time-switcher" id="reading-time-switcher" role="group" aria-label="독해 시간 고르기"></div>
            </div>
          </div>
        </div>
        <article class="reading-card">
          <div class="reading-meta"><span id="reading-level">N5</span><span id="reading-source">N5R p1</span></div>
          <div class="quiz-hud"><div class="quiz-hud-item"><span>진행</span><strong id="reading-progress">1 / 3</strong></div><div class="quiz-hud-item"><span>남은 시간</span><strong id="reading-timer">45초</strong></div><div class="quiz-hud-item"><span>맞힌 수</span><strong id="reading-correct">0</strong></div><div class="quiz-hud-item"><span>연속 성공</span><strong id="reading-streak">0</strong></div></div>
          <div class="reading-header"><div><span class="eyebrow">READING SET</span><h3 id="reading-title">독해 한 문제</h3></div><p class="reading-korean" id="reading-korean"></p></div>
          <div class="reading-passage" id="reading-passage"></div>
          <div class="reading-question-box"><span class="eyebrow">QUESTION</span><h4 id="reading-question">질문을 데려오고 있어요.</h4></div>
          <div class="reading-options" id="reading-options"></div>
          <p class="reading-feedback" id="reading-feedback"></p>
          <p class="reading-explanation" id="reading-explanation"></p>
          <div class="quiz-actions"><button class="primary-btn" id="reading-next" type="button">다음 글도 볼까요?</button></div>
        </article>
      </section>
    </main>
  </div>
  <script src="assets/js/theme.js"></script><script src="assets/js/reading-data.js"></script><script src="assets/js/app.js"></script>
</body>
</html>
