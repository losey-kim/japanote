<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanote - 단어</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">JN</span>
        <div>
          <p class="brand-name">Japanote</p>
          <p class="brand-sub">시험 준비를 학습 루틴으로 바꾸는 개인용 대시보드</p>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="starter.html">처음시작</a>
        <a href="vocab.html" aria-current="page">단어</a>
        <a href="grammar.html">문법</a>
        <a href="reading.html">독해</a>
        <a href="quiz.html">퀴즈</a>
        <a href="match.html">게임</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle>테마: 시스템</button>
    </header>

    <main>
      <section class="page-intro">
        <span class="eyebrow">VOCAB PAGE</span>
        <h1>단어는 여기서 따로 회전합니다</h1>
        <p>한자가 약할 때는 긴 페이지보다 단어 카드만 따로 여는 편이 낫습니다. 읽기, 뜻, 기본 단어를 빠르게 반복하는 화면으로 분리했습니다.</p>
      </section>

      <section id="flashcards" class="content-section two-column">
        <div class="section-heading">
          <span>VOCAB TRAINER</span>
          <h2>한자가 약해도 읽기부터 단어를 붙잡으세요</h2>
          <p class="section-copy">처음에는 글자 모양보다 읽기와 뜻을 먼저 연결하는 편이 좋습니다. N5 단어를 많이 넣어 두었고, 짧게 여러 번 돌도록 맞췄습니다.</p>
        </div>

        <div class="flashcard-panel">
          <button class="flashcard" id="flashcard" type="button" aria-live="polite">
            <span class="flashcard-level" id="flashcard-level">N5</span>
            <strong id="flashcard-word">食べる</strong>
            <p id="flashcard-reading">たべる</p>
            <p class="flashcard-meaning" id="flashcard-meaning">먹다</p>
            <span class="flashcard-hint" id="flashcard-hint">카드를 눌러 뜻 보기</span>
          </button>

          <div class="flashcard-actions">
            <button class="secondary-btn" id="flashcard-prev" type="button">이전</button>
            <button class="secondary-btn" id="flashcard-again" type="button">다시 보기</button>
            <button class="primary-btn" id="flashcard-mastered" type="button">암기 완료</button>
            <button class="secondary-btn" id="flashcard-next" type="button">다음</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
