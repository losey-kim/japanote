      <section id="flashcards" class="content-section two-column">
        <div class="section-heading"><span>VOCAB TRAINER</span><h2>N5 단어 카드</h2><p class="section-copy">카드를 넘기면서 읽기와 뜻을 같이 봅니다.</p></div>
        <div class="flashcard-panel">
          <div class="vocab-toolbar">
            <div class="vocab-view-toggle" role="tablist" aria-label="단어 보기 전환">
              <button class="level-button button-with-icon is-active" type="button" data-vocab-view="card" aria-pressed="true" aria-label="카드 보기"><span class="material-symbols-rounded" aria-hidden="true">style</span><span>카드</span></button>
              <button class="level-button button-with-icon" type="button" data-vocab-view="list" aria-pressed="false" aria-label="리스트 보기"><span class="material-symbols-rounded" aria-hidden="true">view_list</span><span>리스트</span></button>
            </div>
            <p class="vocab-summary" id="vocab-summary">총 0개</p>
          </div>

          <div class="vocab-card-view" id="vocab-card-view">
            <button class="flashcard" id="flashcard" type="button" aria-live="polite"><span class="flashcard-level" id="flashcard-level">N5</span><strong id="flashcard-word">불러오는 중</strong><p id="flashcard-reading">N5 단어를 준비하고 있습니다.</p><p class="flashcard-meaning" id="flashcard-meaning">뜻을 불러오는 중입니다.</p><span class="flashcard-hint" id="flashcard-hint">카드를 눌러 뒤집기</span></button>
            <div class="flashcard-actions"><button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-prev" type="button" aria-label="이전 단어" title="이전 단어"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span></button><button class="secondary-btn" id="flashcard-again" type="button">다시 보기</button><button class="primary-btn" id="flashcard-mastered" type="button">암기 완료</button><button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-next" type="button" aria-label="다음 단어" title="다음 단어"><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button></div>
          </div>

          <div class="vocab-list-view" id="vocab-list-view" hidden>
            <div class="vocab-list" id="vocab-list"></div>
            <div class="vocab-pagination">
              <button class="secondary-btn button-with-icon" id="vocab-page-prev" type="button"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span><span>이전</span></button>
              <span class="vocab-page-info" id="vocab-page-info">1 / 1</span>
              <button class="secondary-btn button-with-icon" id="vocab-page-next" type="button"><span>다음</span><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
            </div>
          </div>
        </div>
