  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span><div><p class="brand-name">Japanote</p><p class="brand-sub">오늘도 가볍게 일본어, 같이 해봐요</p></div></a>
      <nav class="nav-links"><a href="index.html">홈</a><a href="starter.html">첫걸음</a><a href="characters.html">문자</a><a href="vocab.html" aria-current="page">단어</a><a href="grammar.html">문법</a><a href="reading.html">독해</a><a href="quiz.html">퀴즈</a><a href="match.html">매칭</a></nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 바꿔보기" title="테마 바꿔보기"></button>
    </header>
    <main>
      <section id="flashcards" class="content-section two-column">
        <div class="section-heading"><span>VOCAB TRAINER</span><h2>N5 단어, 카드로 익혀봐요</h2><p class="section-copy">카드를 넘기며 읽기랑 뜻을 같이 익혀봐요.</p></div>
        <div class="flashcard-panel">
          <div class="vocab-toolbar">
            <div class="vocab-toolbar-groups">
              <div class="vocab-view-toggle" role="tablist" aria-label="단어 보는 방식 고르기">
                <button class="level-button button-with-icon is-active" type="button" data-vocab-view="card" aria-pressed="true" aria-label="카드로 보기"><span class="material-symbols-rounded" aria-hidden="true">style</span><span>카드</span></button>
                <button class="level-button button-with-icon" type="button" data-vocab-view="list" aria-pressed="false" aria-label="리스트로 보기"><span class="material-symbols-rounded" aria-hidden="true">view_list</span><span>리스트</span></button>
              </div>
              <div class="vocab-filter-toggle" role="group" aria-label="단어 묶음 고르기">
                <button class="secondary-btn vocab-filter-button is-active" type="button" data-vocab-filter="all" aria-pressed="true"><span>전체</span><strong data-vocab-filter-count="all">0</strong></button>
                <button class="secondary-btn vocab-filter-button" type="button" data-vocab-filter="review" aria-pressed="false"><span>다시 보기</span><strong data-vocab-filter-count="review">0</strong></button>
                <button class="secondary-btn vocab-filter-button" type="button" data-vocab-filter="mastered" aria-pressed="false"><span>익힌 단어</span><strong data-vocab-filter-count="mastered">0</strong></button>
              </div>
            </div>
            <p class="vocab-summary" id="vocab-summary">0개 준비됐어요</p>
          </div>

          <div class="vocab-card-view" id="vocab-card-view">
            <article class="flashcard" id="flashcard" aria-live="polite">
              <button class="flashcard-toggle" id="flashcard-toggle" type="button" aria-controls="flashcard-meaning" aria-expanded="false">
                <span class="flashcard-level" id="flashcard-level">N5</span>
                <div class="flashcard-copy">
                  <strong class="flashcard-word" id="flashcard-word">준비 중</strong>
                  <p class="flashcard-reading" id="flashcard-reading">단어를 준비하고 있어요.</p>
                  <p class="flashcard-meaning" id="flashcard-meaning">뜻도 곧 보여드릴게요.</p>
                </div>
                <span class="flashcard-hint" id="flashcard-hint">눌러서 뜻을 확인해보세요.</span>
              </button>
              <div class="flashcard-inline-nav" aria-label="단어 넘기기">
                <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-prev" type="button" aria-label="이전 카드" title="이전 카드"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span></button>
                <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-next" type="button" aria-label="다음 카드" title="다음 카드"><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
              </div>
            </article>
            <div class="flashcard-actions"><button class="secondary-btn" id="flashcard-again" type="button">다시 볼래요</button><button class="primary-btn" id="flashcard-mastered" type="button">익혔어요!</button></div>
          </div>

          <div class="vocab-list-view" id="vocab-list-view" hidden>
            <div class="vocab-list" id="vocab-list"></div>
            <div class="vocab-pagination">
              <button class="secondary-btn button-with-icon" id="vocab-page-prev" type="button"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span><span>이전</span></button>
              <span class="vocab-page-info" id="vocab-page-info">1 / 1</span>
              <button class="secondary-btn button-with-icon" id="vocab-page-next" type="button"><span>다음</span><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/theme.js"></script><script src="assets/js/jlpt-vocab-data.js"></script><script src="assets/js/vocab-registry.js"></script><script src="assets/js/app.js"></script>
</body>
</html>
