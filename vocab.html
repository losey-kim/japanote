<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="문자부터 퀴즈까지, 오늘도 가볍게 일본어 해봐요.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Japanote">
  <meta property="og:title" content="Japanote">
  <meta property="og:description" content="문자부터 퀴즈까지, 오늘도 가볍게 일본어 해봐요.">
  <meta property="og:url" content="https://losey-kim.github.io/Japanote/vocab.html">
  <meta property="og:image" content="https://losey-kim.github.io/Japanote/assets/images/social-preview.png">
  <meta property="og:image:alt" content="Japanote 로고">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Japanote">
  <meta name="twitter:description" content="문자부터 퀴즈까지, 오늘도 가볍게 일본어 해봐요.">
  <meta name="twitter:image" content="https://losey-kim.github.io/Japanote/assets/images/social-preview.png">
  <title>Japanote - 단어 익혀봐요</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span>
        <div>
          <p class="brand-name">Japanote</p>
          <p class="brand-sub">오늘도 가볍게 일본어 해봐요</p>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="characters.html">문자</a>
        <a href="kanji.html">한자</a>
        <a href="vocab.html" aria-current="page">단어</a>
        <a href="grammar.html">문법</a>
        <a href="reading.html">독해</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 바꿔볼까요?" title="테마 바꿔볼까요?"></button>
    </header>
    <main>
      <section id="flashcards" class="content-section two-column">
        <div class="section-heading">
          <span>VOCAB TRAINER</span>
          <h2 id="vocab-heading-title">N5 단어, 카드로 익혀봐요</h2>
          <p class="section-copy" id="vocab-heading-copy" hidden></p>
        </div>
        <div class="vocab-tab-list" role="tablist" aria-label="단어 학습 탭">
          <button class="level-button vocab-tab-button is-active" type="button" data-vocab-tab="study" id="vocab-tab-study" role="tab" aria-selected="true" aria-controls="vocab-tab-panel-study">목록</button>
          <button class="level-button vocab-tab-button" type="button" data-vocab-tab="quiz" id="vocab-tab-quiz" role="tab" aria-selected="false" aria-controls="vocab-tab-panel-quiz" tabindex="-1">퀴즈</button>
          <button class="level-button vocab-tab-button" type="button" data-vocab-tab="match" id="vocab-tab-match" role="tab" aria-selected="false" aria-controls="vocab-tab-panel-match" tabindex="-1">짝맞추기</button>
        </div>
        <div class="vocab-tab-panels">
          <section class="vocab-tab-panel" id="vocab-tab-panel-study" data-vocab-tab-panel="study" role="tabpanel" aria-labelledby="vocab-tab-study">
            <div class="flashcard-panel">
              <div class="vocab-select-toolbar" aria-label="단어 필터">
                <label class="vocab-select-field" for="vocab-level-select">
                  <span>레벨</span>
                  <div class="vocab-select-wrap">
                    <select class="vocab-select" id="vocab-level-select" aria-label="단어 레벨 고르기">
                      <option value="N5">N5</option>
                      <option value="N4">N4</option>
                      <option value="N3">N3</option>
                      <option value="all">전체</option>
                    </select>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </div>
                </label>
                <label class="vocab-select-field" for="vocab-filter-select">
                  <span>모아보기</span>
                  <div class="vocab-select-wrap">
                    <select class="vocab-select" id="vocab-filter-select" aria-label="단어 모아보기 고르기">
                      <option value="all">전체</option>
                      <option value="review">다시 볼래요</option>
                      <option value="mastered">익혔어요</option>
                      <option value="unmarked">아직 안 정했어요</option>
                    </select>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </div>
                </label>
                <label class="vocab-select-field" for="vocab-part-select">
                  <span>품사</span>
                  <div class="vocab-select-wrap">
                    <select class="vocab-select" id="vocab-part-select" aria-label="품사별로 보기">
                      <option value="all">전체 품사</option>
                    </select>
                    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
                  </div>
                </label>
              </div>
              <div class="study-panel-head">
                <p class="vocab-summary" id="vocab-summary">0개 모였어요</p>
                <div class="study-view-switch" role="tablist" aria-label="단어 보기 방식 고르기">
                  <button class="study-view-button is-active" type="button" data-vocab-view="card" aria-pressed="true" aria-label="카드로 보기" title="카드로 보기">
                    <span class="material-symbols-rounded" aria-hidden="true">style</span>
                  </button>
                  <button class="study-view-button" type="button" data-vocab-view="list" aria-pressed="false" aria-label="목록으로 보기" title="목록으로 보기">
                    <span class="material-symbols-rounded" aria-hidden="true">view_list</span>
                  </button>
                </div>
              </div>

              <div class="vocab-card-view" id="vocab-card-view">
                <article class="flashcard" id="flashcard" aria-live="polite">
                  <button class="flashcard-toggle" id="flashcard-toggle" type="button" aria-controls="flashcard-meaning" aria-expanded="false">
                    <span class="flashcard-level" id="flashcard-level">N5</span>
                    <div class="flashcard-copy">
                      <strong class="flashcard-word" id="flashcard-word">불러오는 중이에요</strong>
                      <p class="flashcard-reading" id="flashcard-reading">단어를 불러오고 있어요.</p>
                      <p class="flashcard-meaning" id="flashcard-meaning">뜻도 곧 보여줄게요.</p>
                    </div>
                    <span class="flashcard-hint" id="flashcard-hint">눌러서 뜻을 확인해봐요.</span>
                  </button>
                  <div class="flashcard-inline-nav" aria-label="단어 넘기기">
                    <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-prev" type="button" aria-label="이전 카드" title="이전 카드"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span></button>
                    <button class="secondary-btn flashcard-nav-btn icon-only-btn" id="flashcard-next" type="button" aria-label="다음 카드" title="다음 카드"><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
                  </div>
                </article>
                <div class="flashcard-actions">
                  <button class="secondary-btn" id="flashcard-again" type="button">다시 볼래요</button>
                  <button class="primary-btn" id="flashcard-mastered" type="button">익혔어요!</button>
                </div>
              </div>

              <div class="vocab-list-view" id="vocab-list-view" hidden>
                <div class="vocab-list" id="vocab-list"></div>
                <div class="vocab-pagination">
                  <button class="secondary-btn button-with-icon" id="vocab-page-prev" type="button"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span><span>이전</span></button>
                  <span class="vocab-page-info" id="vocab-page-info">1 / 1</span>
                  <button class="secondary-btn button-with-icon" id="vocab-page-next" type="button"><span>다음</span><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
                </div>
              </div>
            </div>
          </section>

          <section class="vocab-tab-panel" id="vocab-tab-panel-quiz" data-vocab-tab-panel="quiz" role="tabpanel" aria-labelledby="vocab-tab-quiz" hidden aria-hidden="true">
            <div data-shared-quiz-layout="vocab-quiz"></div>
          </section>

          <section class="vocab-tab-panel" id="vocab-tab-panel-match" data-vocab-tab-panel="match" role="tabpanel" aria-labelledby="vocab-tab-match" hidden aria-hidden="true">
            <div data-shared-quiz-layout="match-round"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-sync.js"></script><script src="assets/js/theme.js"></script><script src="assets/js/jlpt-vocab-data.js"></script><script src="assets/js/vocab-registry.js"></script><script src="assets/js/shared-quiz-layouts.js"></script><script src="assets/js/kanji-data.js"></script><script src="assets/js/app.js"></script><script src="assets/js/match-game.js"></script>
</body>
</html>
